name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # This job only reads the repo (install, test, build, git diff) and
          # never pushes, so it doesn't need the checkout token left on disk.
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          cache: 'npm'
          node-version: 24
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm test
      - name: Verify dist is up to date
        # dist/index.js is the committed bundle the action runs. Rebuild and
        # fail if it differs from what's checked in, so a source change can't
        # ship without its rebuilt bundle. Only the bundle is checked, not the
        # sourcemap — esbuild's .map `sources`/`names` aren't byte-stable across
        # platforms, so gating on it would cause spurious failures.
        run: |
          npm run build
          if ! git diff --quiet -- dist/index.js; then
            echo "dist/index.js is out of date. Run 'npm run build' and commit the result." >&2
            git --no-pager diff -- dist/index.js
            exit 1
          fi
